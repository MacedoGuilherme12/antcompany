<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A.N.T. Company — Estratégia · Comercial · Tecnologia</title>
<link rel="stylesheet" href="ant/tokens.css" />
<style>
  /* Animação dos cards flutuantes (Hero split) */
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .floatcard { animation: floaty 6s ease-in-out infinite; }

  /* Hovers de card */
  .pilar-card:hover { border-color: var(--line); transform: translateY(-5px); box-shadow: 0 24px 60px -30px rgba(212,175,55,.35); }
  .svc-card:hover { border-color: var(--line); transform: translateY(-5px); box-shadow: 0 24px 60px -30px rgba(0,0,0,.7); }
  .svc-card:hover .svc-arrow { opacity: 1 !important; color: var(--dourado); transform: translateX(4px); }

  img, svg, canvas { max-width: 100%; }
  input, select, textarea { max-width: 100%; }
  p, a, span, h1, h2, h3, h4 { overflow-wrap: anywhere; }

  select option { background: var(--grafite); color: var(--branco); }

  /* Responsivo */
  @media (max-width: 1100px) {
    [style*="grid-template-columns: repeat(4,1fr)"] { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    [style*="grid-template-columns: repeat(4, 1fr)"] { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    [style*="grid-template-columns: repeat(3,1fr)"] { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    [style*="grid-template-columns: repeat(3, 1fr)"] { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    [style*="grid-template-columns: 1.4fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
  }

  @media (max-width: 900px) {
    .wrap { padding: 0 22px; }
    .nav-links { display: none !important; }
    .nav-burger { display: inline-flex !important; }
    .nav-mobile { display: flex !important; }
    [style*="grid-template-columns: 1.05fr"],
    [style*="grid-template-columns: repeat(3,1fr)"],
    [style*="grid-template-columns: repeat(3, 1fr)"],
    [style*="grid-template-columns: repeat(4,1fr)"],
    [style*="grid-template-columns: repeat(4, 1fr)"],
    [style*="grid-template-columns: 1fr 1.2fr"],
    [style*="grid-template-columns: 1fr 1.4fr"],
    [style*="grid-template-columns: 1fr auto"],
    [style*="grid-template-columns: 1.4fr 1fr 1fr"],
    [style*="grid-template-columns: repeat(2,1fr)"],
    [style*="grid-template-columns: repeat(2, 1fr)"],
    [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }

    [style*="min-height: 92vh"],
    [style*="min-height: 90vh"],
    [style*="min-height: 88vh"] { min-height: auto !important; }

    [style*="padding: 110px 0"],
    [style*="padding: 100px 0"],
    [style*="padding: 90px 0"] { padding: 72px 0 !important; }

    [style*="padding: 120px 0"] { padding: 82px 0 !important; }
    [style*="padding-top: 150px"] { padding-top: 124px !important; }

    [style*="gap: 60px"],
    [style*="gap: 50px"],
    [style*="gap: 40px"] { gap: 30px !important; }

    [style*="height: 460px"] { height: 360px !important; }
    [style*="height: 280px"] { height: 220px !important; }

    [style*="order: 2"],
    [style*="order: 1"] { order: initial !important; }

    [style*="padding: 0 26px"],
    [style*="padding: 0 24px"],
    [style*="padding: 0 30px"] {
      padding: 20px 0 !important;
      border-left: none !important;
      border-top: 1px solid var(--line-soft);
    }

    [style*="padding: 0 26px"]:first-child,
    [style*="padding: 0 24px"]:first-child,
    [style*="padding: 0 30px"]:first-child { border-top: none; }

    .floatcard {
      min-width: 168px !important;
      max-width: calc(100vw - 64px);
      padding: 12px 14px !important;
    }
  }

  @media (max-width: 600px) {
    h1 { letter-spacing: -.01em; }
    h2 { line-height: 1.1; }

    .wrap { padding: 0 18px; }
    .eyebrow {
      gap: 9px;
      font-size: 10.5px;
      letter-spacing: .18em;
      max-width: 100%;
    }
    .eyebrow::before,
    .eyebrow.center::after { width: 20px; }

    .btn {
      width: 100%;
      justify-content: center;
      padding: 14px 18px;
      min-height: 48px;
      text-align: center;
    }

    [style*="display: flex"][style*="gap: 14px"] { width: 100%; }
    [style*="justify-content: center"][style*="gap: 14px"] { width: 100%; }

    [style*="paddingTop: 90px"],
    [style*="padding-top: 90px"] { padding-top: 116px !important; }

    [style*="paddingTop: 110px"],
    [style*="padding-top: 110px"],
    [style*="paddingTop: 120px"],
    [style*="padding-top: 120px"] { padding-top: 112px !important; }

    [style*="paddingBottom: 80px"],
    [style*="padding-bottom: 80px"],
    [style*="paddingBottom: 70px"],
    [style*="padding-bottom: 70px"] { padding-bottom: 58px !important; }

    [style*="padding: 38px 32px"],
    [style*="padding: 34px 32px"],
    [style*="padding: 30px 26px"] { padding: 26px 22px !important; }

    [style*="padding: 38px"] { padding: 24px 18px !important; }
    [style*="padding: 54px 0"] { padding: 36px 0 !important; }
    [style*="padding: 80px 0 110px"] { padding: 58px 0 78px !important; }

    [style*="font-size: 18px"] { font-size: 16px !important; }
    [style*="font-size: 17.5px"],
    [style*="font-size: 16.5px"] { font-size: 15.5px !important; }

    [style*="height: 360px"] { height: 300px !important; }
    [style*="height: 220px"] { height: 190px !important; }

    .floatcard {
      position: relative !important;
      top: auto !important;
      left: auto !important;
      margin: 12px 0 !important;
      min-width: 0 !important;
      width: 100%;
      animation: none;
    }

    [style*="height: 460px"],
    [style*="height: 360px"] {
      height: auto !important;
      min-height: 0 !important;
      padding: 10px 0 !important;
    }

    footer [style*="justify-content: space-between"] {
      align-items: flex-start !important;
      flex-direction: column;
    }

    .twk-panel {
      left: 12px !important;
      right: 12px !important;
      bottom: 12px !important;
      width: auto !important;
      max-height: calc(100vh - 24px) !important;
      transform: none !important;
    }
  }

  @media (max-width: 420px) {
    .wrap { padding: 0 16px; }
    .eyebrow::before,
    .eyebrow.center::after { display: none; }
    [style*="font-size: clamp(40px, 7vw, 92px)"] { font-size: 36px !important; }
    [style*="font-size: clamp(38px, 5.4vw, 76px)"] { font-size: 34px !important; }
    [style*="font-size: clamp(44px, 9vw, 140px)"] { font-size: 39px !important; }
    [style*="font-size: clamp(34px,5.5vw,72px)"] { font-size: 32px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ant/tweaks-panel.jsx"></script>
<script type="text/babel" src="ant/icons.jsx"></script>
<script type="text/babel" src="ant/logo-bg.jsx"></script>
<script type="text/babel" src="ant/home.jsx"></script>
<script type="text/babel" src="ant/sections.jsx"></script>
<script type="text/babel" src="ant/pages.jsx"></script>
<script type="text/babel" src="ant/app.jsx"></script>
</body>
</html>
